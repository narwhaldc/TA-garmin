#   TA-garmin — Garmin technology add-on for the Wearables platform
#   Ingest-side field normalization: maps Garmin Connect events into the
#   canonical "Wearables" data model (Sleep / HeartRate / Activity / Workout /
#   Daily / Device). Data is delivered to HEC by tools/garmin_to_hec.py
#   (index=wearables), with indexed fields vendor + person_id set at ingest.

