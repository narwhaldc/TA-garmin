#   TA-garmin props.conf — canonical normalization for Garmin Health API sourcetypes.
#
#   ⚠ PROVISIONAL / PRE-BUILD. Field names below follow the official Garmin Health
#   REST API Specification (camelCase; seconds + meters). NOTE: the chosen build
#   route is PATH B (unofficial garth poller, see GARMIN-PATHB-POLLER.md) whose
#   Connect-internal-API keys DIFFER (e.g. deepSleepSeconds, dailySleepDTO). The
#   canonical TARGETS (left side) stay; re-derive each EVAL right-hand side from a
#   real garth response before shipping. Mirrors the
#   TA-oura pattern: KV_MODE=json, canonical EVAL/FIELDALIAS, vendor + dataset tags,
#   person enrichment. Identity (vendor, person_id) is stamped at INGEST by the
#   receiver (see GARMIN-INGEST.md), NOT here.

# --- Sleep session -> Wearables > Sleep (tag=wearable_sleep) ---
[garmin:sleeps]
KV_MODE = json
SHOULD_LINEMERGE = false
TRUNCATE = 0
EVAL-total_sleep_min = round(durationInSeconds/60, 1)
EVAL-deep_min        = round(deepSleepDurationInSeconds/60, 1)
EVAL-light_min       = round(lightSleepDurationInSeconds/60, 1)
EVAL-rem_min         = round(remSleepInSeconds/60, 1)
EVAL-awake_min       = round(awakeDurationInSeconds/60, 1)
EVAL-sleep_type      = "long_sleep"
EVAL-day             = calendarDate
EVAL-vendor          = "garmin"
EVAL-wearable_dataset = "sleep"
LOOKUP-wearable_person = wearable_person_profile person_id OUTPUT person_name step_goal

# --- Heart rate (EXPLODED from the dailies HR map by the receiver) -> HeartRate ---
[garmin:heart_rate]
KV_MODE = json
SHOULD_LINEMERGE = false
TRUNCATE = 0
# receiver emits one event per sample with `bpm` already set + _time = start+offset
EVAL-vendor           = "garmin"
EVAL-wearable_dataset = "heartrate"
LOOKUP-wearable_person = wearable_person_profile person_id OUTPUT person_name step_goal

# --- Daily summary -> Wearables > Activity (tag=wearable_activity) ---
[garmin:dailies]
KV_MODE = json
SHOULD_LINEMERGE = false
TRUNCATE = 0
EVAL-steps           = steps
EVAL-distance_m      = distanceInMeters
EVAL-active_calories = activeKilocalories
EVAL-total_calories  = activeKilocalories + bmrKilocalories
EVAL-active_min      = round((moderateIntensityDurationInSeconds + vigorousIntensityDurationInSeconds)/60, 0)
EVAL-active_high_min   = round(vigorousIntensityDurationInSeconds/60, 0)
EVAL-active_medium_min = round(moderateIntensityDurationInSeconds/60, 0)
EVAL-step_goal       = stepsGoal
EVAL-day             = calendarDate
# daily-wellness bits Garmin gives directly (map into Daily-root canon when added):
# restingHeartRateInBeatsPerMinute, averageStressLevel -> stress_avg, body battery via garmin:stress
EVAL-vendor          = "garmin"
EVAL-wearable_dataset = "activity"
LOOKUP-wearable_person = wearable_person_profile person_id OUTPUT person_name step_goal

# --- Activities (discrete workouts) -> Wearables > Workout (tag=wearable_workout) ---
[garmin:activities]
KV_MODE = json
SHOULD_LINEMERGE = false
TRUNCATE = 0
EVAL-workout_activity    = activityType
EVAL-workout_start_epoch = startTimeInSeconds
EVAL-workout_end_epoch   = startTimeInSeconds + durationInSeconds
EVAL-workout_calories    = activeKilocalories
EVAL-workout_distance_m  = distanceInMeters
EVAL-workout_id          = activityId
EVAL-vendor              = "garmin"
EVAL-wearable_dataset    = "workout"
LOOKUP-wearable_person = wearable_person_profile person_id OUTPUT person_name step_goal

