#   TA-garmin props.conf — canonical normalization for Garmin Connect (Path B).
#
#   Field names are the ACTUAL Connect-API keys captured by tools/garmin_probe.py
#   and emitted (clean, top-level) by tools/garmin_to_hec.py. Written from a
#   schema-only probe (the test account had no synced device yet) — VALUES to be
#   validated when a real Garmin device syncs. Same pattern as TA-oura: identity
#   (vendor, person_id) is stamped at INGEST by the poller, not here.

# --- Sleep session -> Wearables > Sleep (tag=wearable_sleep) ---
[garmin:sleeps]
KV_MODE = json
SHOULD_LINEMERGE = false
TRUNCATE = 0
EVAL-total_sleep_min = round(sleepTimeSeconds/60, 1)
EVAL-deep_min        = round(deepSleepSeconds/60, 1)
EVAL-light_min       = round(lightSleepSeconds/60, 1)
EVAL-rem_min         = round(remSleepSeconds/60, 1)
EVAL-awake_min       = round(awakeSleepSeconds/60, 1)
EVAL-sleep_score     = sleepScore
EVAL-sleep_type      = "long_sleep"
EVAL-day             = calendarDate
EVAL-vendor          = "garmin"
EVAL-wearable_dataset = "sleep"
LOOKUP-wearable_person = wearable_person_profile person_id OUTPUT person_name step_goal

# --- Daily summary -> Activity + Daily (tag=wearable_activity + wearable_daily) ---
# Garmin intensity values are already MINUTES (not seconds). One event/day carries
# both the activity totals and the daily-wellness summary (resting HR, stress, spo2,
# body battery), so it feeds both roots without double-counting.
[garmin:dailies]
KV_MODE = json
SHOULD_LINEMERGE = false
TRUNCATE = 0
EVAL-steps           = totalSteps
EVAL-distance_m      = totalDistanceMeters
EVAL-active_calories = activeKilocalories
EVAL-total_calories  = totalKilocalories
EVAL-active_min      = moderateIntensityMinutes + vigorousIntensityMinutes
EVAL-active_high_min   = vigorousIntensityMinutes
EVAL-active_medium_min = moderateIntensityMinutes
EVAL-step_goal       = dailyStepGoal
EVAL-spo2_avg        = averageSpo2
EVAL-stress_avg      = averageStressLevel
EVAL-body_battery    = bodyBatteryHighestValue
EVAL-day             = calendarDate
EVAL-vendor          = "garmin"
EVAL-wearable_dataset = "activity"
LOOKUP-wearable_person = wearable_person_profile person_id OUTPUT person_name step_goal

# --- Heart rate (poller-exploded to one bpm/event) -> HeartRate (tag=wearable_heartrate) ---
[garmin:heart_rate]
KV_MODE = json
SHOULD_LINEMERGE = false
TRUNCATE = 0
EVAL-vendor           = "garmin"
EVAL-wearable_dataset = "heartrate"
LOOKUP-wearable_person = wearable_person_profile person_id OUTPUT person_name step_goal

# --- Workouts -> Wearables > Workout (tag=wearable_workout) ---
[garmin:activities]
KV_MODE = json
SHOULD_LINEMERGE = false
TRUNCATE = 0
EVAL-workout_activity    = activityType
EVAL-workout_id          = activityId
EVAL-workout_start_epoch = strptime(startTimeGMT, "%Y-%m-%d %H:%M:%S")
EVAL-workout_end_epoch   = strptime(startTimeGMT, "%Y-%m-%d %H:%M:%S") + duration
EVAL-workout_calories    = calories
EVAL-workout_distance_m  = distance
EVAL-vendor              = "garmin"
EVAL-wearable_dataset    = "workout"
LOOKUP-wearable_person = wearable_person_profile person_id OUTPUT person_name step_goal

# --- Respiration -> Daily (tag=wearable_daily); unique field, no dailies overlap ---
[garmin:respiration]
KV_MODE = json
SHOULD_LINEMERGE = false
TRUNCATE = 0
EVAL-respiration_avg  = coalesce(avgSleepRespirationValue, avgWakingRespirationValue)
EVAL-vendor           = "garmin"
EVAL-wearable_dataset = "respiration"
LOOKUP-wearable_person = wearable_person_profile person_id OUTPUT person_name step_goal

# --- HRV (nightly avg) -> Daily (tag=wearable_daily) ---
[garmin:hrv]
KV_MODE = json
SHOULD_LINEMERGE = false
TRUNCATE = 0
EVAL-hrv_avg          = lastNightAvg
EVAL-vendor           = "garmin"
EVAL-wearable_dataset = "hrv"
LOOKUP-wearable_person = wearable_person_profile person_id OUTPUT person_name step_goal

# --- Body composition -> Daily (tag=wearable_daily) ---
[garmin:bodycomp]
KV_MODE = json
SHOULD_LINEMERGE = false
TRUNCATE = 0
EVAL-weight_kg     = round(weight/1000, 1)
EVAL-bmi           = bmi
EVAL-body_fat_pct  = bodyFat
EVAL-vendor        = "garmin"
EVAL-wearable_dataset = "bodycomp"
LOOKUP-wearable_person = wearable_person_profile person_id OUTPUT person_name step_goal

# --- User metrics (VO2 max, fitness age) -> Daily (tag=wearable_daily) ---
[garmin:usermetrics]
KV_MODE = json
SHOULD_LINEMERGE = false
TRUNCATE = 0
EVAL-vo2max        = vo2Max
EVAL-fitness_age   = fitnessAge
EVAL-vendor        = "garmin"
EVAL-wearable_dataset = "user_metrics"
LOOKUP-wearable_person = wearable_person_profile person_id OUTPUT person_name step_goal

# --- Device hardware -> Wearables > Device (tag=wearable_device) ---
# Garmin (Path B) DOES expose device metadata (unlike the official Health API).
# No ring-style battery %, but model + firmware populate the Device dashboard.
[garmin:devices]
KV_MODE = json
SHOULD_LINEMERGE = false
TRUNCATE = 0
EVAL-device_id         = "garmin:" . deviceId
EVAL-device_name       = productDisplayName
EVAL-device_fw_version = softwareVersion
EVAL-device_hw_version = partNumber
EVAL-vendor            = "garmin"
EVAL-wearable_dataset  = "device_config"
LOOKUP-wearable_person = wearable_person_profile person_id OUTPUT person_name step_goal
LOOKUP-wearable_device = wearable_device_profile device_id OUTPUT device_name

# --- Intraday detail kept for future use; not mapped to Daily canon (dailies has
#     the daily stress/spo2 averages, so these stay tag=wearable only to avoid
#     double-counting the Daily root). ---
[garmin:stress]
KV_MODE = json
SHOULD_LINEMERGE = false
TRUNCATE = 0
EVAL-vendor = "garmin"
EVAL-wearable_dataset = "stress"

[garmin:pulseox]
KV_MODE = json
SHOULD_LINEMERGE = false
TRUNCATE = 0
EVAL-vendor = "garmin"
EVAL-wearable_dataset = "spo2"
