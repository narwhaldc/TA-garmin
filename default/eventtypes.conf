#   TA-garmin eventtypes.conf — tag Garmin events into the Wearables model.
#   PROVISIONAL (pre-build). Same vendor-neutral tags TA-oura uses, so Garmin
#   contributes to the same data-model roots.

[garmin_sleep]
search = sourcetype=garmin:sleeps

[garmin_heart_rate]
search = sourcetype=garmin:heart_rate

[garmin_activity]
search = sourcetype=garmin:dailies

[garmin_workout]
search = sourcetype=garmin:activities

[garmin_pulseox]
search = sourcetype=garmin:pulseox

[garmin_respiration]
search = sourcetype=garmin:respiration

[garmin_stress]
search = sourcetype=garmin:stress

[garmin_hrv]
search = sourcetype=garmin:hrv

[garmin_user_metrics]
search = sourcetype=garmin:userMetrics
