#   TA-garmin eventtypes.conf — tag Garmin (Path B poller) events into the
#   Wearables model. Sourcetypes match tools/garmin_to_hec.py output.

[garmin_sleep]
search = sourcetype=garmin:sleeps

[garmin_dailies]
search = sourcetype=garmin:dailies

[garmin_heart_rate]
search = sourcetype=garmin:heart_rate

[garmin_workout]
search = sourcetype=garmin:activities

[garmin_respiration]
search = sourcetype=garmin:respiration

[garmin_hrv]
search = sourcetype=garmin:hrv

[garmin_bodycomp]
search = sourcetype=garmin:bodycomp

[garmin_usermetrics]
search = sourcetype=garmin:usermetrics

[garmin_device]
search = sourcetype=garmin:devices

[garmin_stress]
search = sourcetype=garmin:stress

[garmin_pulseox]
search = sourcetype=garmin:pulseox
