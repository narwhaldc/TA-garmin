#   TA-garmin tags.conf — vendor-neutral dataset tags for the Wearables model.
#   garmin:dailies is the one-per-day summary -> feeds BOTH Activity and Daily
#   roots. Intraday stress/pulseox are tag=wearable only (dailies already carries
#   the daily stress/spo2 averages -> avoids double-counting the Daily root).

[eventtype=garmin_sleep]
wearable = enabled
wearable_sleep = enabled

[eventtype=garmin_dailies]
wearable = enabled
wearable_activity = enabled
wearable_daily = enabled

[eventtype=garmin_heart_rate]
wearable = enabled
wearable_heartrate = enabled

[eventtype=garmin_workout]
wearable = enabled
wearable_workout = enabled

[eventtype=garmin_respiration]
wearable = enabled
wearable_daily = enabled

[eventtype=garmin_hrv]
wearable = enabled
wearable_daily = enabled

[eventtype=garmin_bodycomp]
wearable = enabled
wearable_daily = enabled

[eventtype=garmin_usermetrics]
wearable = enabled
wearable_daily = enabled

[eventtype=garmin_device]
wearable = enabled
wearable_device = enabled

[eventtype=garmin_stress]
wearable = enabled

[eventtype=garmin_pulseox]
wearable = enabled
